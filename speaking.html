<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MITHILA | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f172a; 
            --gold: #b59410; 
            --gold-light: #d4af37;
            --slate: #475569; 
            --offwhite: #fcfcfc;
            --white: #ffffff; 
            --bg: var(--offwhite); 
            --text: #1e293b;
            --card-bg: var(--white); 
            --nav-bg: rgba(255, 255, 255, 0.85);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg: #0a0f1d; 
            --text: #f1f5f9; 
            --card-bg: #161e2d;
            --nav-bg: rgba(10, 15, 29, 0.85); 
            --white: #1e293b; 
            --slate: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.7; 
            font-size: 0.9rem; 
            transition: background 0.5s ease; 
            overflow-x: hidden; 
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; letter-spacing: -0.02em; }

        /* Unified Navigation - Premium Blur Effect */
        nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 20px 0; 
            z-index: 1000; 
            background: var(--nav-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(181, 148, 16, 0.1); 
        }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        
        /* Logo & Dropdown Logic */
        .logo-wrap { display: flex; align-items: center; gap: 12px; position: relative; }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--navy); 
            text-decoration: none; 
            letter-spacing: 2px; 
            transition: var(--transition);
        }
        [data-theme="dark"] .logo { color: white; }
        
        .dropdown-trigger { 
            cursor: pointer; 
            font-size: 0.7rem; 
            color: var(--gold); 
            transition: var(--transition);
            padding: 5px;
        }

        /* Agency-style Dropdown Menu */
        .nav-dropdown { 
            position: absolute; 
            top: 130%; 
            left: 0; 
            background: var(--card-bg); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            list-style: none; 
            padding: 15px 0; 
            min-width: 260px; 
            display: none; 
            border-radius: 8px; 
            border: 1px solid rgba(181, 148, 16, 0.2); 
            z-index: 1001;
        }
        .nav-dropdown.show { display: block; animation: slideDown 0.3s ease-out; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-dropdown li a { 
            display: block; 
            padding: 12px 25px; 
            text-decoration: none; 
            color: var(--text); 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            font-weight: 600;
            letter-spacing: 1px;
            transition: var(--transition);
        }
        .nav-dropdown li a:hover { background: rgba(181, 148, 16, 0.08); color: var(--gold); padding-left: 30px; }

        .nav-links { display: flex; list-style: none; gap: 30px; align-items: center; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 600; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            transition: var(--transition);
        }
        .nav-links a:hover { color: var(--gold); }
        
        .resume-btn { 
            border: 1px solid var(--gold); 
            padding: 10px 20px; 
            border-radius: 4px; 
            color: var(--gold) !important;
            transition: var(--transition) !important;
        }
        .resume-btn:hover { background: var(--gold); color: white !important; }

        /* Shared Section Header Styling */
        .page-header { 
            padding: 180px 0 100px; 
            background: var(--navy); 
            color: white; 
            text-align: center; 
            position: relative;
            overflow: hidden;
        }
        .page-header::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to top, var(--bg), transparent);
        }

        /* Buttons & Switches */
        .theme-switch { 
            cursor: pointer; width: 38px; height: 38px; 
            border-radius: 50%; border: 1px solid rgba(181, 148, 16, 0.3); 
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .theme-switch:hover { border-color: var(--gold); background: rgba(181, 148, 16, 0.05); }
        .theme-switch svg { width: 18px; height: 18px; fill: var(--gold); }

        /* Standardized Section Titles */
        .section-title-wrap { text-align: center; margin: 100px 0 60px; }
        .section-title { 
            font-size: clamp(2rem, 4vw, 3rem); 
            position: relative; 
            display: inline-block;
            padding-bottom: 15px;
        }
        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 60px; height: 3px; background: var(--gold);
        }

        /* Contact Section Refinement */
        .contact-section { padding: 140px 0; background: var(--navy); color: white; text-align: center; }
        .email-link { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(1.8rem, 6vw, 4rem); 
            color: var(--white); 
            text-decoration: none; 
            transition: var(--transition);
            display: inline-block;
            margin: 20px 0;
        }
        .email-link:hover { color: var(--gold); transform: translateY(-3px); }

        @media (max-width: 850px) {
            .nav-links { display: none; }
            .container { padding: 0 25px; }
        }
    </style>
</head>
<body id="body">

    <nav>
        <div class="container nav-container">
            <div class="logo-wrap">
                <a href="index.html" class="logo">MITHILA</a>
                <span class="dropdown-trigger" onclick="toggleDropdown()">EXPLORE ▼</span>
                <ul class="nav-dropdown" id="navDropdown">
                    <li><a href="pr.html">PR & Communications</a></li>
                    <li><a href="marketing.html">Marketing & Storytelling</a></li>
                    <li><a href="strategy.html">Strategic Planning</a></li>
                    <li><a href="voiceover.html">Voiceover</a></li>
                    <li><a href="speaking.html">Anchoring & Speaking</a></li>
                </ul>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#expertise">Expertise</a></li>
                <li><a href="https://www.linkedin.com/in/rejawanachowdhurymithila" target="_blank">LinkedIn</a></li>
                <li><a href="YOUR_DRIVE_LINK" target="_blank" class="resume-btn">Resume</a></li>
                <li class="theme-switch" onclick="toggleTheme()">
                    <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
                </li>
            </ul>
        </div>
    </nav>

    <script>
        function toggleDropdown() { document.getElementById('navDropdown').classList.toggle('show'); }
        
        function toggleTheme() {
            const body = document.getElementById('body');
            const themeIcon = document.getElementById('themeIcon');
            const isDark = body.hasAttribute('data-theme');
            if (isDark) {
                body.removeAttribute('data-theme');
                themeIcon.innerHTML = '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>';
            } else {
                body.setAttribute('data-theme', 'dark');
                themeIcon.innerHTML = '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>';
            }
        }
        
        // Close dropdown when clicking outside
        window.onclick = function(e) {
            if (!e.target.matches('.dropdown-trigger')) {
                const dd = document.getElementById('navDropdown');
                if (dd.classList.contains('show')) dd.classList.remove('show');
            }
        }
    </script>
</body>
</html>
